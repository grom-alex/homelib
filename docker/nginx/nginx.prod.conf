worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Логирование
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting: строгий для логина/регистрации (brute force), мягкий для refresh
    limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth_refresh:10m rate=30r/m;
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        client_max_body_size 100m;

        # Docker DNS resolver — переразрешение имён при пересоздании контейнеров
        resolver 127.0.0.11 valid=10s ipv6=off;

        set $upstream_api http://api:8080;
        set $upstream_frontend http://frontend:80;

        # API requests (^~ gives priority over regex locations like static assets)
        location ^~ /api/ {
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Строгий rate limiting на логин/регистрацию (защита от brute force)
        location /api/auth/login {
            limit_req zone=auth_login burst=3 nodelay;

            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/auth/register {
            limit_req zone=auth_login burst=3 nodelay;

            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Мягкий rate limiting на refresh (защищён httpOnly cookie, вызывается часто)
        location /api/auth/refresh {
            limit_req zone=auth_refresh burst=10 nodelay;

            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check (без логирования)
        location /health {
            proxy_pass $upstream_api;
            access_log off;
        }

        # Frontend (SPA)
        location / {
            proxy_pass $upstream_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Кеширование статики фронтенда (Vite output directory).
        # Используем prefix-match вместо regex по расширениям, чтобы не
        # перехватывать API-пути вроде /api/books/:id/image/foo.png.
        location /assets/ {
            proxy_pass $upstream_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
